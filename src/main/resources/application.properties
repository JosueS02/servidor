spring.application.name=invernadero
# ==========================================
# CONFIGURACIÓN DE BASE DE DATOS POSTGRESQL
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/invernadero_db
spring.datasource.username=postgres
spring.datasource.password=admin

# ==========================================
# CONFIGURACIÓN DE HIBERNATE / JPA
# ==========================================
# update: Crea o actualiza las tablas automáticamente basándose en las clases @Entity
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONFIGURACIÓN DEL SERVIDOR WEB
# ==========================================
server.port=8080

# ==========================================
# CONFIGURACIÓN MQTT (MOSQUITTO)
# ==========================================
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=invernadero-server
# El símbolo '#' es un comodín. Escuchará todo lo que empiece con "invernadero/sensores/"
mqtt.topic.sensores=invernadero/sensores/#

jwt.secret=InvernaderoSecretKeySuperSegura1234567890ParaSpringSecurity
jwt.expiration=86400000 
# (El token durará 24 horas = 86400000 ms)